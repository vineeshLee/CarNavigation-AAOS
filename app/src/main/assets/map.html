<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0A0A0A;
        }
        /* Converts standard OSM tiles into a premium Obsidian dark mode style matching Polestar theme */
        .leaflet-tile-container {
            filter: invert(90%) hue-rotate(180deg) brightness(100%) contrast(100%);
        }
        .leaflet-container {
            background-color: #0A0A0A !important;
        }
    </style>
    <script>
        let map;
        let carMarker;
        let routePolyline;
        let markers = {};

        function initMap() {
            // Stockholm center
            const center = [59.33258, 18.06490];
            
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView(center, 14);

            L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 19
            }).addTo(map);

            // Car pointer arrow icon matching Kinetic Gold
            const carIcon = L.divIcon({
                html: `<div id="car-arrow" style="transform: rotate(0deg); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 20px solid #D4F000; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5)); transition: transform 0.2s ease;"></div>`,
                className: 'car-icon',
                iconSize: [16, 20],
                iconAnchor: [8, 10]
            });

            carMarker = L.marker(center, { icon: carIcon }).addTo(map);
            routePolyline = L.polyline([], { color: '#00E5FF', weight: 6 }).addTo(map);

            if (window.AndroidInterface) {
                window.AndroidInterface.onMapReady();
            }
        }

        function updateCarPosition(lat, lng, heading) {
            const pos = [lat, lng];
            carMarker.setLatLng(pos);
            map.panTo(pos);
            
            // Apply heading rotation to the golden arrow element
            const arrow = document.getElementById('car-arrow');
            if (arrow) {
                arrow.style.transform = `rotate(${heading}deg)`;
            }
        }

        function setRoute(startLat, startLng, endLat, endLng) {
            routePolyline.setLatLngs([
                [startLat, startLng],
                [endLat, endLng]
            ]);
        }

        function clearRoute() {
            routePolyline.setLatLngs([]);
        }

        function addMarker(id, lat, lng, title, snippet, type) {
            if (markers[id]) {
                map.removeLayer(markers[id]);
            }

            let color = '#FFB4AB'; // Peach/Rose for Restaurant
            if (type === 'electric') color = '#D4F000'; // Gold
            if (type === 'gas') color = '#00E5FF'; // Cyan

            const customIcon = L.divIcon({
                html: `<div style="width: 14px; height: 14px; background-color: ${color}; border: 2px solid #0A0A0A; border-radius: 50%; box-shadow: 0 0 6px rgba(0,0,0,0.6);"></div>`,
                className: 'custom-icon',
                iconSize: [18, 18],
                iconAnchor: [9, 9]
            });

            const marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
            marker.bindPopup(`<strong style="color:black; font-family: sans-serif;">${title}</strong><br/><span style="color:black; font-family: sans-serif;">${snippet}</span>`);

            marker.on('click', () => {
                if (window.AndroidInterface) {
                    window.AndroidInterface.onMarkerClick(id, type);
                }
            });

            markers[id] = marker;
        }

        function zoomIn() {
            map.zoomIn();
        }

        function zoomOut() {
            map.zoomOut();
        }
    </script>
</head>
<body onload="initMap()">
    <div id="map"></div>
</body>
</html>
